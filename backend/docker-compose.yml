
services:
  db:
    image: postgres:16
    env_file:
      - .env.docker
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-dailynewshub}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ${ECR_REGISTRY:-671460502091.dkr.ecr.eu-north-1.amazonaws.com}/${IMAGE_NAME:-dailynewshub-backend}:latest
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/dailynewshub}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      FIREBASE_CREDENTIALS_PATH: /app/firebase-credentials.json
      UPLOADS_DIR: uploads
      DEBUG: "False"
    env_file:
      - .env.docker
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-worker:
    image: ${ECR_REGISTRY:-671460502091.dkr.ecr.eu-north-1.amazonaws.com}/${IMAGE_NAME:-dailynewshub-backend}:latest
    command: celery -A app.core.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/dailynewshub}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      FIREBASE_CREDENTIALS_PATH: /app/firebase-credentials.json
      UPLOADS_DIR: uploads
      DEBUG: "False"
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    image: ${ECR_REGISTRY:-671460502091.dkr.ecr.eu-north-1.amazonaws.com}/${IMAGE_NAME:-dailynewshub-backend}:latest
    command: celery -A app.core.celery_app beat --loglevel=info --schedule=/var/lib/celery/celerybeat-schedule
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/dailynewshub}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      FIREBASE_CREDENTIALS_PATH: /app/firebase-credentials.json
      UPLOADS_DIR: uploads
      DEBUG: "False"
    env_file:
      - .env.docker
    volumes:
      - celery-beat-data:/var/lib/celery
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data:
  celery-beat-data:
  uploads-data:
