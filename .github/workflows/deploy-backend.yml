name: Deploy Backend to AWS EC2

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

env:
  AWS_REGION: eu-north-1
  IMAGE_NAME: dailynewshub-backend
  ECR_REGISTRY: 671460502091.dkr.ecr.eu-north-1.amazonaws.com

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd backend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Setup SSH Key
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync deployment files to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key $EC2_USER@$EC2_HOST "mkdir -p ~/dailynewshub/backend && touch ~/dailynewshub/backend/.env.docker"
          scp -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key backend/docker-compose.yml $EC2_USER@$EC2_HOST:~/dailynewshub/backend/docker-compose.yml

      - name: Execute Remote Docker Deployment on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ECR_TOKEN=$(aws ecr get-login-password --region ${{ env.AWS_REGION }})
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key $EC2_USER@$EC2_HOST << EOF
            set -ex
            cd ~/dailynewshub/backend
            export ECR_REGISTRY="${{ env.ECR_REGISTRY }}"
            export IMAGE_NAME="${{ env.IMAGE_NAME }}"

            # Detect if docker requires sudo on EC2
            DOCKER_BIN="docker"
            if ! docker info >/dev/null 2>&1; then
              DOCKER_BIN="sudo docker"
            fi

            echo "$ECR_TOKEN" | \$DOCKER_BIN login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
            \$DOCKER_BIN pull ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            (\$DOCKER_BIN compose down || \$DOCKER_BIN-compose down || true)
            (\$DOCKER_BIN compose up -d || \$DOCKER_BIN-compose up -d)
          EOF
